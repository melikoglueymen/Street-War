<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sokak Savaşı | Satellite Pro</title>
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
    <script src='https://unpkg.com/@turf/turf@6/turf.min.js'></script>
    <style>
        :root { --blue: #00d2ff; --red: #ff4757; --dark: #121212; }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; background: #000; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        /* Üst HUD */
        .hud-top {
            position: absolute; top: 12px; left: 12px; right: 12px;
            display: flex; justify-content: space-between; align-items: flex-start;
            z-index: 10; pointer-events: none;
        }
        .profile-card {
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
            padding: 8px 15px; border-radius: 15px; border-left: 4px solid var(--blue);
            color: white; pointer-events: auto; min-width: 120px;
        }
        .xp-bar { width: 100%; height: 4px; background: #333; margin-top: 5px; border-radius: 2px; overflow: hidden; }
        .xp-fill { width: 30%; height: 100%; background: var(--blue); transition: width 0.3s; }

        /* Sağ Alt Kontroller */
        .controls-right {
            position: absolute; bottom: 30px; right: 15px;
            display: flex; flex-direction: column; gap: 15px; z-index: 10;
        }
        .btn-round {
            width: 55px; height: 55px; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); border: none; cursor: pointer;
        }
        .btn-main { background: var(--blue); color: white; transform: scale(1.1); }

        /* Alt Veri Paneli */
        .data-strip {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 40px 20px 10px; color: white; display: flex;
            justify-content: space-around; font-size: 12px; text-align: center;
        }
        .data-val { font-size: 18px; font-weight: bold; display: block; color: var(--blue); }

        /* Gelişmiş Profil Modalı */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); z-index: 100; color: white; overflow-y: auto;
        }
        .modal.active { display: block; }
        .modal-content { padding: 25px; }
        .close-x { float: right; font-size: 30px; color: #888; }
        
        .profile-header { text-align: center; margin-bottom: 30px; }
        .avatar-l { 
            width: 100px; height: 100px; background: #222; border-radius: 50%; 
            margin: 0 auto 10px; border: 3px solid var(--blue); 
        }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .stat-card { background: #1e1e1e; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        .input-group input, .input-group select {
            width: 100%; background: #222; border: 1px solid #444; padding: 12px;
            color: white; border-radius: 8px; box-sizing: border-box;
        }

        .team-picker { display: flex; gap: 10px; }
        .team-opt { 
            flex: 1; padding: 15px; border-radius: 10px; text-align: center; 
            border: 2px solid #333; font-weight: bold; 
        }
        .opt-blue.active { border-color: var(--blue); background: rgba(0,210,255,0.1); }
        .opt-red.active { border-color: var(--red); background: rgba(255,71,87,0.1); }
    </style>
</head>
<body>

<div id="map"></div>

<div class="hud-top">
    <div class="profile-card" onclick="openModal()">
        <div style="font-size: 14px;"><b id="name-hud">Oyuncu</b> <small id="lv-hud">Lv.1</small></div>
        <div class="xp-bar"><div id="xp-fill" class="xp-fill"></div></div>
    </div>
    <div class="profile-card" style="border-left: 4px solid #fff;">
        <span id="speed-hud">0</span> <small>km/s</small>
    </div>
</div>

<div class="data-strip">
    <div><span class="data-val" id="area-val">0</span>BÖLGE</div>
    <div><span class="data-val" id="dist-val">0.0</span>KM YOL</div>
    <div><span class="data-val" id="kcal-val">0</span>KCAL</div>
</div>

<div class="controls-right">
    <button class="btn-round" onclick="toggleStyle()">🛰️</button>
    <button class="btn-round btn-main" onclick="centerToLocation()">📍</button>
</div>

<div id="profileModal" class="modal">
    <div class="modal-content">
        <span class="close-x" onclick="closeModal()">×</span>
        <div class="profile-header">
            <div class="avatar-l" id="avatar-img"></div>
            <h2 id="name-display">Karakter Adı</h2>
        </div>

        <div class="input-group">
            <label>OYUNCU ADI</label>
            <input type="text" id="name-input" placeholder="Adını yaz..." onchange="saveProfile()">
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <small>MAX HIZ</small>
                <div class="data-val" id="max-speed-val">0</div>
            </div>
            <div class="stat-card">
                <small>TOPLAM SÜRE</small>
                <div class="data-val" id="time-val">0 dk</div>
            </div>
        </div>

        <div class="input-group">
            <label>TAKIMIN</label>
            <div class="team-picker">
                <div id="btn-blue" class="team-opt opt-blue" onclick="changeTeam('blue')">MAVİ</div>
                <div id="btn-red" class="team-opt opt-red" onclick="changeTeam('red')">KIRMIZI</div>
            </div>
        </div>

        <div class="input-group">
            <label>TİTREŞİM (HAPTIC)</label>
            <select id="vibrate-opt" onchange="saveProfile()">
                <option value="on">Açık</option>
                <option value="off">Kapalı</option>
            </select>
        </div>

        <button onclick="resetGame()" style="width:100%; padding:15px; background:none; border:1px solid #ff4757; color:#ff4757; border-radius:10px; margin-top:20px;">VERİLERİ TEMİZLE</button>
    </div>
</div>

<script>
    // TOKEN VE AYARLAR
    mapboxgl.accessToken = 'pk.eyJ1Ijoic3RyZWV0LXdhciIsImEiOiJjbW9vNnM5Nmcwd3N0MnNzNHc2YXRuazBwIn0.FcDgSGYd4lyEKtusZPEphg';

    let userData = JSON.parse(localStorage.getItem('sw_data')) || {
        name: 'SokakSavascisi',
        team: 'blue',
        zones: [],
        dist: 0,
        maxSpeed: 0,
        vibrate: 'on',
        startTime: Date.now()
    };

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/satellite-streets-v12', // UYDU GÖRÜNÜMÜ
        center: [28.9784, 41.0082],
        zoom: 16,
        pitch: 50,
        antialias: true
    });

    let lastCoord = null;
    let userMarker = new mapboxgl.Marker({ color: userData.team === 'blue' ? '#00d2ff' : '#ff4757' });
    let isSatellite = true;

    map.on('load', () => {
        // Bölge katmanı
        map.addSource('zones', { 'type': 'geojson', 'data': { 'type': 'FeatureCollection', 'features': [] } });
        map.addLayer({
            'id': 'z-layer', 'type': 'fill', 'source': 'zones',
            'paint': { 
                'fill-color': userData.team === 'blue' ? '#00d2ff' : '#ff4757', 
                'fill-opacity': 0.5,
                'fill-outline-color': '#fff'
            }
        });

        updateUI();
        renderZones();
        startTracking();
    });

    function startTracking() {
        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude, speed } = pos.coords;
            const current = [longitude, latitude];
            
            // Hız Analizi
            let kmh = speed ? Math.round(speed * 3.6) : 0;
            document.getElementById('speed-hud').innerText = kmh;
            if(kmh > userData.maxSpeed) userData.maxSpeed = kmh;

            // Mesafe ve Kalori
            if (lastCoord) {
                let d = turf.distance(lastCoord, current);
                if (d > 0.003) { 
                    userData.dist += d;
                    saveProfile();
                }
            }
            lastCoord = current;
            userMarker.setLngLat(current).addTo(map);

            // Bölge Kapma (Grid)
            const g = 0.03 / 111;
            const gx = Math.floor(longitude / g) * g;
            const gy = Math.floor(latitude / g) * g;
            const id = `${gx},${gy}`;

            if (!userData.zones.includes(id)) {
                userData.zones.push(id);
                if(userData.vibrate === 'on' && window.navigator.vibrate) window.navigator.vibrate(100);
                saveProfile();
                renderZones();
            }
            updateUI();
        }, null, { enableHighAccuracy: true });
    }

    function renderZones() {
        const features = userData.zones.map(id => {
            const [x, y] = id.split(',').map(Number);
            const g = 0.03 / 111;
            return turf.polygon([[[x,y],[x+g,y],[x+g,y+g],[x,y+g],[x,y]]]);
        });
        map.getSource('zones').setData({ 'type': 'FeatureCollection', 'features': features });
    }

    function updateUI() {
        document.getElementById('name-hud').innerText = userData.name;
        document.getElementById('area-val').innerText = userData.zones.length;
        document.getElementById('dist-val').innerText = userData.dist.toFixed(1);
        document.getElementById('kcal-val').innerText = Math.round(userData.dist * 60); // Ort. yürüyüş kcal
        
        let lv = Math.floor(userData.zones.length / 10) + 1;
        document.getElementById('lv-hud').innerText = "Lv." + lv;
        let progress = (userData.zones.length % 10) * 10;
        document.getElementById('xp-fill').style.width = progress + "%";
        
        // Modal içi istatistikler
        document.getElementById('max-speed-val').innerText = userData.maxSpeed;
        let mins = Math.floor((Date.now() - userData.startTime) / 60000);
        document.getElementById('time-val').innerText = mins + " dk";
    }

    // FONKSİYONLAR
    function openModal() {
        document.getElementById('name-input').value = userData.name;
        document.getElementById('vibrate-opt').value = userData.vibrate;
        document.getElementById('name-display').innerText = userData.name;
        document.getElementById('btn-blue').className = 'team-opt opt-blue ' + (userData.team === 'blue' ? 'active' : '');
        document.getElementById('btn-red').className = 'team-opt opt-red ' + (userData.team === 'red' ? 'active' : '');
        document.getElementById('profileModal').classList.add('active');
    }
    
    function closeModal() { document.getElementById('profileModal').classList.remove('active'); }

    function saveProfile() {
        userData.name = document.getElementById('name-input').value || 'Savaşçı';
        userData.vibrate = document.getElementById('vibrate-opt').value;
        localStorage.setItem('sw_data', JSON.stringify(userData));
        updateUI();
    }

    function changeTeam(t) {
        userData.team = t;
        let color = t === 'blue' ? '#00d2ff' : '#ff4757';
        userMarker.getElement().children[0].children[0].setAttribute('fill', color);
        if(map.getLayer('z-layer')) map.setPaintProperty('z-layer', 'fill-color', color);
        saveProfile();
        openModal(); // UI'ı tazele
    }

    function toggleStyle() {
        isSatellite = !isSatellite;
        map.setStyle(isSatellite ? 'mapbox://styles/mapbox/satellite-streets-v12' : 'mapbox://styles/mapbox/streets-v12');
    }

    function centerToLocation() { if(lastCoord) map.flyTo({center: lastCoord, zoom: 18, pitch: 60}); }
    
    function resetGame() {
        if(confirm("Tüm ilerlemen silinecek, emin misin?")) {
            localStorage.removeItem('sw_data');
            location.reload();
        }
    }
</script>
</body>
</html>
