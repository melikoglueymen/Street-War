<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Street-War V1.7 | Pro</title>
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
    <script src='https://unpkg.com/@turf/turf@6/turf.min.js'></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --p: #00ff88; }
        body { margin: 0; padding: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* Üst Panel */
        .hud { position: absolute; z-index: 10; pointer-events: none; width: 100%; padding: 15px; box-sizing: border-box; }
        .top-ui { display: flex; justify-content: space-between; align-items: flex-start; }
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px); color: white; padding: 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); pointer-events: auto; }
        
        .status-tag { background: #ff4757; color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: bold; margin-bottom: 4px; display: inline-block; }

        /* Sağ Butonlar */
        .side-btns { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 15px; z-index: 20; }
        .btn-circle { width: 55px; height: 55px; border-radius: 50%; border: none; background: #fff; color: #000; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4); pointer-events: auto; }
        .btn-loc { background: #fff; }
        .btn-run { background: var(--p); color: #000; font-weight: bold; font-size: 14px; }
        .btn-run.active { background: #ff4757; color: #fff; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* Profil ve Renk */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; color: white; padding: 30px; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .modal.active { display: flex; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0; }
        .c-dot { width: 40px; height: 40px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
        .c-dot.active { border-color: white; transform: scale(1.2); }
        input { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; width: 250px; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="hud top-ui">
    <div class="glass" onclick="openSettings()">
        <div class="status-tag">LIVE: <span id="online-count">1</span> OYUNCU</div> <br>
        <b id="nick-disp">Yükleniyor...</b> <br>
        <small id="area-count">Bölge: 0</small>
    </div>
    <div class="glass">
        <span id="speed-disp" style="font-size: 18px; font-weight: bold;">0</span> <small>km/s</small>
    </div>
</div>

<div class="side-btns">
    <button class="btn-circle btn-loc" onclick="centerMe()">📍</button>
    <button class="btn-circle btn-run" id="run-btn" onclick="toggleRun()">BAŞLA</button>
</div>

<div id="p-modal" class="modal">
    <h3>PROFİL AYARLARI</h3>
    <input type="text" id="nick-in" placeholder="Takma Adın">
    <div class="color-grid" id="picker"></div>
    <button onclick="saveProfile()" class="glass" style="width: 250px; background: var(--p); color: black; font-weight: bold;">KAYDET</button>
</div>

<script>
    // Firebase Yapılandırması
    const firebaseConfig = {
      apiKey: "AIzaSyALFQsXRYUTTdEdZ_535gUR34mcTEKEqco",
      authDomain: "street-war-d530a.firebaseapp.com",
      databaseURL: "https://street-war-d530a-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "street-war-d530a",
      storageBucket: "street-war-d530a.firebasestorage.app",
      messagingSenderId: "66586237765",
      appId: "1:66586237765:web:fcc218ef41a288d765fc2c"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const myId = localStorage.getItem('sw_uid') || 'u' + Math.floor(Math.random()*99999);
    localStorage.setItem('sw_uid', myId);

    mapboxgl.accessToken = 'pk.eyJ1Ijoic3RyZWV0LXdhciIsImEiOiJjbW9vNnM5Nmcwd3N0MnNzNHc2YXRuazBwIn0.FcDgSGYd4lyEKtusZPEphg';
    
    let myColor = localStorage.getItem('sw_color') || '#00ff88';
    let myNick = localStorage.getItem('sw_nick') || 'Savaşçı';
    let isRunning = false;
    let myTrail = [];
    let lastPos = null;
    let markers = {};
    let myMarker = null;

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/dark-v11',
        center: [28.9784, 41.0082],
        zoom: 16,
        pitch: 45
    });

    map.on('load', () => {
        // İz ve Bölge Katmanları
        map.addSource('zones', { type: 'geojson', data: { type: 'FeatureCollection', features: [] }});
        map.addLayer({ id: 'zone-layer', type: 'fill', source: 'zones', paint: { 'fill-color': ['get', 'color'], 'fill-opacity': 0.4 }});

        map.addSource('trail', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: [] }}});
        map.addLayer({ id: 'trail-layer', type: 'line', source: 'trail', paint: { 'line-color': myColor, 'line-width': 4, 'line-cap': 'round' }});

        initUI();
        startGPS();
        syncMultiplayer();
    });

    function initUI() {
        document.getElementById('nick-disp').innerText = myNick;
        document.documentElement.style.setProperty('--p', myColor);
        const colors = ['#00ff88', '#00d2ff', '#ff4757', '#f1c40f', '#9b59b6', '#ffffff', '#ff9f43', '#e84393'];
        const picker = document.getElementById('picker');
        colors.forEach(c => {
            const d = document.createElement('div');
            d.className = `c-dot ${c === myColor ? 'active' : ''}`;
            d.style.background = c;
            d.onclick = () => { myColor = c; document.querySelectorAll('.c-dot').forEach(el => el.classList.remove('active')); d.classList.add('active'); };
            picker.appendChild(d);
        });
    }

    function startGPS() {
        navigator.geolocation.watchPosition(pos => {
            const coord = [pos.coords.longitude, pos.coords.latitude];
            const speed = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
            document.getElementById('speed-disp').innerText = speed;

            // Kendi Marker'ın
            if(!myMarker) {
                myMarker = new mapboxgl.Marker({ color: myColor, scale: 0.8 }).setLngLat(coord).addTo(map);
                map.flyTo({ center: coord, zoom: 17 });
            } else {
                myMarker.setLngLat(coord);
            }

            if (isRunning && lastPos) {
                if (turf.distance(lastPos, coord) > 0.002) { 
                    myTrail.push(coord);
                    checkLoop(coord);
                    map.getSource('trail').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: myTrail }});
                }
            }
            lastPos = coord;
            db.ref('players/' + myId).set({ pos: coord, color: myColor, nick: myNick, ts: Date.now() });
        }, null, { enableHighAccuracy: true });
    }

    function toggleRun() {
        isRunning = !isRunning;
        const btn = document.getElementById('run-btn');
        if(isRunning) {
            btn.innerText = "BİTİR";
            btn.classList.add('active');
            myTrail = [lastPos];
        } else {
            btn.innerText = "BAŞLA";
            btn.classList.remove('active');
            myTrail = [];
            map.getSource('trail').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: [] }});
        }
    }

    function checkLoop(current) {
        if (myTrail.length < 10) return;
        if (turf.distance(current, myTrail[0]) < 0.015) {
            const poly = turf.polygon([[...myTrail, myTrail[0]]]);
            db.ref('zones/' + myId + '_' + Date.now()).set({ geo: poly.geometry, color: myColor, owner: myId });
            toggleRun(); // Otomatik bitir ve alanı al
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }
    }

    function centerMe() {
        if(lastPos) map.flyTo({ center: lastPos, zoom: 18, pitch: 45 });
    }

    function syncMultiplayer() {
        db.ref('zones').on('value', snap => {
            const val = snap.val() || {};
            const feats = Object.values(val).map(z => ({ type: 'Feature', geometry: z.geo, properties: { color: z.color, owner: z.owner }}));
            map.getSource('zones').setData({ type: 'FeatureCollection', features: feats });
            const myZones = feats.filter(f => f.properties.owner === myId).length;
            document.getElementById('area-count').innerText = "Bölge: " + myZones;
        });

        db.ref('players').on('value', snap => {
            const players = snap.val() || {};
            const ids = Object.keys(players);
            document.getElementById('online-count').innerText = ids.length;
            ids.forEach(id => {
                if(id === myId) return;
                const p = players[id];
                if(!markers[id]) {
                    markers[id] = new mapboxgl.Marker({ color: p.color, scale: 0.6 }).setLngLat(p.pos).addTo(map);
                } else {
                    markers[id].setLngLat(p.pos);
                }
            });
        });
    }

    function openSettings() { document.getElementById('p-modal').classList.add('active'); }
    function saveProfile() {
        myNick = document.getElementById('nick-in').value || 'Savaşçı';
        localStorage.setItem('sw_nick', myNick);
        localStorage.setItem('sw_color', myColor);
        location.reload();
    }
</script>
</body>
</html>
