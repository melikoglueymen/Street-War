<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sokak Savaşı | Pro</title>
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
    <script src='https://unpkg.com/@turf/turf@6/turf.min.js'></script>
    <style>
        :root { --primary: #00d2ff; --bg-dark: rgba(30, 30, 30, 0.95); }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #f0f0f0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        /* HUD - Üst Göstergeler (Boşluksuz) */
        .hud-top {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; z-index: 10; pointer-events: none;
        }
        .hud-item {
            background: var(--bg-dark); color: white; padding: 8px 15px;
            border-radius: 20px; font-weight: bold; pointer-events: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 1px solid var(--primary);
        }

        /* Alt Kontrol Paneli */
        .hud-bottom {
            position: absolute; bottom: 20px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; align-items: flex-end;
            z-index: 10;
        }

        /* Butonlar */
        .circle-btn {
            width: 55px; height: 55px; background: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; border: none;
        }
        .main-btn { background: var(--primary); width: 65px; height: 65px; }

        /* Profil ve Ayarlar Modalı */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100; color: white; padding: 30px;
            box-sizing: border-box; backdrop-filter: blur(5px);
        }
        .modal.active { display: block; }
        .modal-header { display: flex; justify-content: space-between; font-size: 24px; margin-bottom: 20px; color: var(--primary); }
        
        .setting-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid #444;
        }
        .team-select { display: flex; gap: 10px; margin-top: 10px; }
        .team-box { 
            flex: 1; padding: 10px; border-radius: 10px; border: 2px solid #444; 
            text-align: center; cursor: pointer; font-weight: bold;
        }
        .team-red { color: #ff4757; } .team-blue { color: #00d2ff; }
        .active-red { border-color: #ff4757; background: rgba(255, 71, 87, 0.2); }
        .active-blue { border-color: #00d2ff; background: rgba(0, 210, 255, 0.2); }

        /* Animasyonlar */
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .capturing { animation: pulse 1s infinite; color: #ff4757; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="hud-top">
    <div class="hud-item" onclick="toggleModal('profileModal')">
        Lv <span id="lv-txt">1</span> | <span id="name-txt">Oyuncu</span>
    </div>
    <div class="hud-item">
        <span id="speed-txt">0</span> km/s
    </div>
</div>

<div class="hud-bottom">
    <button class="circle-btn" onclick="toggleModal('settingsModal')">⚙️</button>
    <button class="circle-btn main-btn" onclick="centerToLocation()">📍</button>
    <div class="hud-item">
        Bölge: <span id="area-txt">0</span>
    </div>
</div>

<div id="profileModal" class="modal">
    <div class="modal-header"><span>Profil</span> <span onclick="toggleModal('profileModal')">×</span></div>
    <p>Kullanıcı Adı:</p>
    <input type="text" id="username-in" onchange="updateProfile()" style="width:100%; padding:10px; border-radius:5px; border:none; font-size:18px;">
    
    <div style="margin-top:20px; background:#222; padding:20px; border-radius:15px;">
        <p>İstatistikler</p>
        <div class="setting-row"><span>Toplam Mesafe:</span> <span id="dist-txt">0.0 km</span></div>
        <div class="setting-row"><span>Kazanılan Puan:</span> <span id="xp-txt">0</span></div>
    </div>

    <p>Takım Seçimi:</p>
    <div class="team-select">
        <div id="t-red" class="team-box team-red" onclick="setTeam('red')">KIRMIZI</div>
        <div id="t-blue" class="team-box team-blue" onclick="setTeam('blue')">MAVİ</div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-header"><span>Ayarlar</span> <span onclick="toggleModal('settingsModal')">×</span></div>
    <div class="setting-row">
        <span>Yüksek Hassasiyet (GPS)</span>
        <input type="checkbox" checked disabled>
    </div>
    <div class="setting-row">
        <span>Harita Stili</span>
        <select onchange="changeMapStyle(this.value)" style="padding:5px;">
            <option value="light-v11">Aydınlık</option>
            <option value="streets-v12">Sokak</option>
            <option value="satellite-v9">Uydu</option>
            <option value="dark-v11">Karanlık</option>
        </select>
    </div>
    <div class="setting-row">
        <span>Bölge Şeffaflığı</span>
        <input type="range" min="1" max="9" value="6" onchange="changeOpacity(this.value)">
    </div>
    <button onclick="resetData()" style="background:#ff4757; color:white; border:none; width:100%; padding:15px; border-radius:10px; margin-top:30px; font-weight:bold;">VERİLERİ SIFIRLA</button>
</div>

<script>
    mapboxgl.accessToken = 'pk.eyJ1Ijoic3RyZWV0LXdhciIsImEiOiJjbW9vNnM5Nmcwd3N0MnNzNHc2YXRuazBwIn0.FcDgSGYd4lyEKtusZPEphg';

    let userTeam = localStorage.getItem('team') || 'blue';
    let teamColor = userTeam === 'blue' ? '#00d2ff' : '#ff4757';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/light-v11',
        center: [28.9784, 41.0082],
        zoom: 15,
        pitch: 45
    });

    let myZones = new Set(JSON.parse(localStorage.getItem('zones')) || []);
    let totalDist = parseFloat(localStorage.getItem('dist')) || 0;
    let lastCoord = null;
    let userMarker = new mapboxgl.Marker({ color: teamColor });

    map.on('load', () => {
        map.addSource('zones', { 'type': 'geojson', 'data': { 'type': 'FeatureCollection', 'features': [] } });
        map.addLayer({
            'id': 'z-layer', 'type': 'fill', 'source': 'zones',
            'paint': { 'fill-color': teamColor, 'fill-opacity': 0.6, 'fill-outline-color': '#fff' }
        });
        updateGrid();
        startGPS();
        loadProfile();
    });

    function startGPS() {
        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude, speed } = pos.coords;
            const current = [longitude, latitude];
            
            // Hız ve Mesafe
            if (speed) document.getElementById('speed-txt').innerText = Math.round(speed * 3.6);
            if (lastCoord) {
                let d = turf.distance(lastCoord, current);
                if (d > 0.002) { // Sadece hareket varsa
                    totalDist += d;
                    localStorage.setItem('dist', totalDist.toFixed(2));
                    document.getElementById('dist-txt').innerText = totalDist.toFixed(1) + " km";
                }
            }
            lastCoord = current;
            userMarker.setLngLat(current).addTo(map);

            // Grid Kapma
            const g = 0.03 / 111;
            const gx = Math.floor(longitude / g) * g;
            const gy = Math.floor(latitude / g) * g;
            const id = `${gx},${gy}`;

            if (!myZones.has(id)) {
                myZones.add(id);
                localStorage.setItem('zones', JSON.stringify(Array.from(myZones)));
                updateGrid();
                updateStats();
            }
        }, null, { enableHighAccuracy: true });
    }

    function updateGrid() {
        const features = Array.from(myZones).map(id => {
            const [x, y] = id.split(',').map(Number);
            const g = 0.03 / 111;
            return turf.polygon([[[x,y],[x+g,y],[x+g,y+g],[x,y+g],[x,y]]]);
        });
        map.getSource('zones').setData({ 'type': 'FeatureCollection', 'features': features });
    }

    function updateStats() {
        document.getElementById('area-txt').innerText = myZones.size;
        document.getElementById('lv-txt').innerText = Math.floor(myZones.size / 10) + 1;
        document.getElementById('area-display')?.innerText ? document.getElementById('area-display').innerText = myZones.size : null;
    }

    function toggleModal(id) { document.getElementById(id).classList.toggle('active'); }

    function updateProfile() {
        let n = document.getElementById('username-in').value;
        localStorage.setItem('username', n);
        document.getElementById('name-txt').innerText = n;
    }

    function loadProfile() {
        let n = localStorage.getItem('username') || "Oyuncu";
        document.getElementById('username-in').value = n;
        document.getElementById('name-txt').innerText = n;
        document.getElementById('dist-txt').innerText = totalDist.toFixed(1) + " km";
        setTeam(userTeam);
        updateStats();
    }

    function setTeam(t) {
        userTeam = t;
        localStorage.setItem('team', t);
        teamColor = t === 'blue' ? '#00d2ff' : '#ff4757';
        document.getElementById('t-red').className = 'team-box team-red ' + (t==='red'?'active-red':'');
        document.getElementById('t-blue').className = 'team-box team-blue ' + (t==='blue'?'active-blue':'');
        if(map.getLayer('z-layer')) map.setPaintProperty('z-layer', 'fill-color', teamColor);
    }

    function changeMapStyle(s) { map.setStyle('mapbox://styles/mapbox/' + s); }
    function changeOpacity(v) { map.setPaintProperty('z-layer', 'fill-opacity', v/10); }
    function centerToLocation() { if(lastCoord) map.flyTo({center: lastCoord, zoom: 17}); }
    function resetData() { if(confirm("Tüm bölgelerin silinecek! Emin misin?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
