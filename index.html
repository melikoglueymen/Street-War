<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sokak Savaşı | V1.0</title>
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
    <script src='https://unpkg.com/@turf/turf@6/turf.min.js'></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        .ui-panel {
            position: absolute; top: 10px; left: 10px; right: 10px;
            background: rgba(20, 20, 20, 0.85); color: white;
            padding: 15px; border-radius: 15px; z-index: 10;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
        }
        .stats { display: flex; justify-content: space-between; font-size: 12px; }
        .score { font-size: 18px; font-weight: bold; color: #00d2ff; margin-top: 5px; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-panel">
    <div class="stats">
        <span id="status">Sinyal bekleniyor...</span>
        <span>Bölgelerim: <b id="area-count">0</b></span>
    </div>
    <div class="score">SOKAK SAVAŞI</div>
</div>

<script>
    // SENİN TOKENIN
    mapboxgl.accessToken = 'pk.eyJ1Ijoic3RyZWV0LXdhciIsImEiOiJjbW9vNnM5Nmcwd3N0MnNzNHc2YXRuazBwIn0.FcDgSGYd4lyEKtusZPEphg';

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/dark-v11',
        center: [28.9784, 41.0082],
        zoom: 17,
        pitch: 60
    });

    let myCapturedZones = new Set(); // Ele geçirilen karelerin ID'leri
    const gridSize = 0.03; // Yaklaşık 30 metrelik kareler

    map.on('load', () => {
        // GPS İzleme Başlat
        startTracking();
        
        // Harita üzerine boyanan yerler için katman oluştur
        map.addSource('captured-zones', {
            'type': 'geojson',
            'data': { 'type': 'FeatureCollection', 'features': [] }
        });

        map.addLayer({
            'id': 'zone-layer',
            'type': 'fill',
            'source': 'captured-zones',
            'paint': {
                '巷-color': '#00d2ff',
                'fill-opacity': 0.5,
                'fill-outline-color': '#ffffff'
            }
        });
    });

    function startTracking() {
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude } = pos.coords;
                
                // Koordinatı kare merkezine yuvarla (Grid Mantığı)
                const gridX = Math.floor(longitude / (gridSize / 111)) * (gridSize / 111);
                const gridY = Math.floor(latitude / (gridSize / 111)) * (gridSize / 111);
                const zoneId = `${gridX},${gridY}`;

                if (!myCapturedZones.has(zoneId)) {
                    myCapturedZones.add(zoneId);
                    updateMapGrid(gridX, gridY);
                }

                map.flyTo({ center: [longitude, latitude], speed: 0.8 });
                document.getElementById('status').innerText = "Aktif: Bölge taranıyor...";
                document.getElementById('area-count').innerText = myCapturedZones.size;

            }, null, { enableHighAccuracy: true });
        }
    }

    function updateMapGrid(lng, lat) {
        const features = Array.from(myCapturedZones).map(id => {
            const [x, y] = id.split(',').map(Number);
            const offset = gridSize / 111;
            return turf.polygon([[
                [x, y],
                [x + offset, y],
                [x + offset, y + offset],
                [x, y + offset],
                [x, y]
            ]]);
        });

        map.getSource('captured-zones').setData({
            'type': 'FeatureCollection',
            'features': features
        });
    }
</script>
</body>
</html>
