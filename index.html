<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sokak Savaşı | Canlı Multiplayer</title>
    <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
    <script src='https://unpkg.com/@turf/turf@6/turf.min.js'></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --p: #00d2ff; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        .hud { position: absolute; z-index: 10; pointer-events: none; width: 100%; padding: 15px; box-sizing: border-box; }
        .top-ui { display: flex; justify-content: space-between; }
        .glass { background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); color: white; padding: 12px; border-radius: 15px; border: 1px solid var(--p); pointer-events: auto; }
        
        .color-bar { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 10; pointer-events: auto; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 25px; }
        .dot { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; transition: 0.2s; }
        .dot:active { transform: scale(0.8); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; color: white; padding: 30px; }
        .modal.active { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .input-st { width: 100%; max-width: 300px; padding: 15px; margin: 20px 0; background: #222; border: 1px solid #444; color: white; border-radius: 10px; text-align: center; font-size: 18px; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="hud top-ui">
    <div class="glass" onclick="document.getElementById('p-modal').classList.add('active')">
        <b id="nick-disp">Savaşçı</b> <br>
        <small id="area-count">Bölgelerim: 0</small>
    </div>
    <div class="glass">
        <span id="speed-disp">0</span> <small>km/s</small>
    </div>
</div>

<div class="color-bar" id="palette"></div>

<div id="p-modal" class="modal">
    <h2>KARAKTERİNİ OLUŞTUR</h2>
    <input type="text" id="nick-in" class="input-st" placeholder="Takma Adın...">
    <button onclick="saveProfile()" class="glass" style="width:200px; background:var(--p); color:black; font-weight:bold;">BAŞLA</button>
</div>

<script>
    // --- SENİN ÖZEL FİREBASE YAPILANDIRMAN ---
    const firebaseConfig = {
      apiKey: "AIzaSyALFQsXRYUTTdEdZ_535gUR34mcTEKEqco",
      authDomain: "street-war-d530a.firebaseapp.com",
      databaseURL: "https://street-war-d530a-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "street-war-d530a",
      storageBucket: "street-war-d530a.firebasestorage.app",
      messagingSenderId: "66586237765",
      appId: "1:66586237765:web:fcc218ef41a288d765fc2c",
      measurementId: "G-G1EJFXXZ1N"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // Benzersiz kullanıcı ID'si
    const myId = localStorage.getItem('sw_uid') || 'u' + Math.floor(Math.random()*100000);
    localStorage.setItem('sw_uid', myId);

    // Mapbox Token
    mapboxgl.accessToken = 'pk.eyJ1Ijoic3RyZWV0LXdhciIsImEiOiJjbW9vNnM5Nmcwd3N0MnNzNHc2YXRuazBwIn0.FcDgSGYd4lyEKtusZPEphg';
    
    let myColor = localStorage.getItem('sw_color') || '#00d2ff';
    let myTrail = [];
    let lastPos = null;
    let markers = {};

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/satellite-streets-v12',
        center: [28.9784, 41.0082],
        zoom: 17,
        pitch: 50
    });

    map.on('load', () => {
        // Çizgi ve Bölge Katmanları
        map.addSource('my-trail', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: [] }}});
        map.addLayer({ id: 'trail-line', type: 'line', source: 'my-trail', paint: { 'line-color': myColor, 'line-width': 4, 'line-dasharray': [2, 1] }});

        map.addSource('zones', { type: 'geojson', data: { type: 'FeatureCollection', features: [] }});
        map.addLayer({ id: 'zone-fill', type: 'fill', source: 'zones', paint: { 'fill-color': ['get', 'color'], 'fill-opacity': 0.4 }});

        initGame();
    });

    function initGame() {
        if(!localStorage.getItem('sw_nick')) {
            document.getElementById('p-modal').classList.add('active');
        } else {
            document.getElementById('nick-disp').innerText = localStorage.getItem('sw_nick');
            startTracking();
            syncMultiplayer();
        }
        setupColors();
        document.documentElement.style.setProperty('--p', myColor);
    }

    function startTracking() {
        navigator.geolocation.watchPosition(pos => {
            const coord = [pos.coords.longitude, pos.coords.latitude];
            const speed = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
            document.getElementById('speed-disp').innerText = speed;

            if (lastPos) {
                if (turf.distance(lastPos, coord) > 0.002) { // 2 metre hareket
                    myTrail.push(coord);
                    checkLoop(coord);
                    updateTrailUI();
                }
            } else { map.flyTo({center: coord}); }
            
            lastPos = coord;
            // Konumunu Firebase'e gönder
            db.ref('players/' + myId).set({ 
                pos: coord, 
                color: myColor, 
                nick: localStorage.getItem('sw_nick'),
                ts: Date.now()
            });
        }, null, { enableHighAccuracy: true });
    }

    function checkLoop(current) {
        if (myTrail.length < 8) return;
        const distToStart = turf.distance(current, myTrail[0]);

        if (distToStart < 0.012) { // Başlangıca 12 metre yaklaşınca kapat
            const poly = turf.polygon([[...myTrail, myTrail[0]]]);
            db.ref('zones/' + myId + '_' + Date.now()).set({ 
                geo: poly.geometry, 
                color: myColor, 
                owner: myId 
            });
            myTrail = [];
            if(navigator.vibrate) navigator.vibrate(150);
        }
    }

    function syncMultiplayer() {
        // Bölgeleri güncelle
        db.ref('zones').on('value', snap => {
            const val = snap.val() || {};
            const feats = Object.values(val).map(z => ({ 
                type: 'Feature', 
                geometry: z.geo, 
                properties: { color: z.color }
            }));
            map.getSource('zones').setData({ type: 'FeatureCollection', features: feats });
            
            const myZoneCount = feats.filter(f => f.properties.owner === myId).length;
            document.getElementById('area-count').innerText = "Bölgelerim: " + myZoneCount;
        });

        // Diğer oyuncuları haritada göster
        db.ref('players').on('value', snap => {
            const players = snap.val() || {};
            Object.keys(players).forEach(id => {
                if(id === myId) return;
                const p = players[id];
                if(!markers[id]) {
                    markers[id] = new mapboxgl.Marker({ color: p.color })
                        .setLngLat(p.pos)
                        .setPopup(new mapboxgl.Popup().setText(p.nick))
                        .addTo(map);
                } else {
                    markers[id].setLngLat(p.pos);
                }
            });
        });
    }

    function setupColors() {
        const colors = ['#00d2ff', '#ff4757', '#2ecc71', '#f1c40f', '#9b59b6', '#ff9f43'];
        const bar = document.getElementById('palette');
        colors.forEach(c => {
            const d = document.createElement('div');
            d.className = 'dot';
            d.style.background = c;
            d.onclick = () => { 
                myColor = c; 
                localStorage.setItem('sw_color', c);
                location.reload(); 
            };
            bar.appendChild(d);
        });
    }

    function updateTrailUI() {
        if(myTrail.length > 1) {
            map.getSource('my-trail').setData({ type: 'Feature', geometry: { type: 'LineString', coordinates: myTrail }});
        }
    }

    function saveProfile() {
        const n = document.getElementById('nick-in').value || 'Savaşçı';
        localStorage.setItem('sw_nick', n);
        location.reload();
    }
</script>
</body>
</html>
